<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.google.com/specimen/Fraunces" rel="stylesheet">
  <link href="https://fonts.google.com/specimen/Montserrat" rel="stylesheet">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <div class="rect">
    <img src="images/image-product-desktop.jpg" alt="product" class="main-image">
    <div class="text">
      <p>P E R F U M E</p>
      <h1 class="name">Gabrielle Essence Eau De Parfum</h1>

      <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>

      <div class="price">
        <span class="actual">$149.99</span>
        <span class="disc">$169.99</span>
      </div>

      <button><img src="images/icon-cart.svg" alt="icon">Add to Cart</button>
    </div>

  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">ShtagerR</a>.
  </footer>
</body>
</html>
